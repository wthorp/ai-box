# Shared inference tuning (MoE checklist: mlock, no-mmap, KV quant, CUDA env)
x-inference-performance: &inference-performance
  network_mode: host
  ipc: host
  cap_add:
    - SYS_NICE
    - IPC_LOCK
  security_opt:
    - seccomp:unconfined
  ulimits:
    memlock:
      soft: -1
      hard: -1
    stack: 67108864
  mem_limit: ${INFERENCE_MEMORY_LIMIT:-88g}
  memswap_limit: ${INFERENCE_MEMORY_SWAP_LIMIT:-88g}
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  environment:
    - MALLOC_ARENA_MAX=2
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - CUDA_DEVICE_MAX_CONNECTIONS=1
    - GGML_CUDA_FORCE_MMQ=1

services:
  rotorquant:
    build: ./rotorquant
    image: ai-box-rotorquant:latest
    <<: *inference-performance

    volumes:
      - ${MODELS_DIR:-/data/ai/models}:/models:ro

    command: >
      -m /models/${MODEL_FILE:-model.gguf}
      -ngl 999
      --fit off
      --no-mmap
      --mlock
      --n-cpu-moe ${CPU_MOE_LAYERS:-35}
      --cache-type-k planar4
      --cache-type-v planar3
      -c ${CONTEXT_SIZE:-8192}
      --host 0.0.0.0
      --port 8080
      --jinja

    # Autostart the server after host reboots. Memory/swap limits above keep a
    # bad model/context/MoE combination from taking the host down with it.
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 900s

  tabbyapi:
    build:
      context: .
      dockerfile: scripts/tabbyapi.Dockerfile
      args:
        TABBYAPI_VERSION: ${TABBYAPI_VERSION:-latest}
    image: ai-box-tabbyapi:${TABBYAPI_VERSION:-latest}
    profiles:
      - tabby
    <<: *inference-performance

    volumes:
      - ${MODELS_DIR:-/data/ai/models}:/app/models:ro
      - ${AI_BOX_HOST_DIR:-.}:/workspace:ro

    working_dir: /app

    environment:
      - TABBY_HOST=${TABBY_HOST:-0.0.0.0}
      - TABBY_PORT=${TABBY_PORT:-5000}
      - TABBY_MODEL_NAME=${TABBY_MODEL_NAME:-gemma-4-31b-dense-exl3}
      - TABBY_MODEL_DIR=${TABBY_MODEL_DIR:-models}
      - TABBY_BACKEND=${TABBY_BACKEND:-exllamav3}
      - TABBY_CONTEXT_SIZE=${TABBY_CONTEXT_SIZE:-32768}
      - TABBY_CACHE_SIZE=${TABBY_CACHE_SIZE:-32768}
      - TABBY_CACHE_MODE=${TABBY_CACHE_MODE:-Q8}
      - TABBY_GPU_SPLIT=${TABBY_GPU_SPLIT:-23.0}
      - TABBY_GPU_SPLIT_AUTO=${TABBY_GPU_SPLIT_AUTO:-}
      - TABBY_TOOL_FORMAT=${TABBY_TOOL_FORMAT:-}
      - TABBY_FORCE_ENABLE_THINKING=${TABBY_FORCE_ENABLE_THINKING:-}
      - TABBY_REASONING=${TABBY_REASONING:-}
      - TABBY_MAX_BATCH_SIZE=${TABBY_MAX_BATCH_SIZE:-1}
      - TABBY_AUTOSPLIT_RESERVE_MIB=${TABBY_AUTOSPLIT_RESERVE_MIB:-1024}
      - TABBY_OVERRIDE_PRESET=${TABBY_OVERRIDE_PRESET:-qsa_coding}
      - TABBY_TEMPERATURE=${TABBY_TEMPERATURE:-0.8}
      - TABBY_TOP_P=${TABBY_TOP_P:-0.95}
      - TABBY_TOP_K=${TABBY_TOP_K:-40}
      - TABBY_MIROSTAT=${TABBY_MIROSTAT:-2}
      - TABBY_MIROSTAT_TAU=${TABBY_MIROSTAT_TAU:-4.5}
      - TABBY_MIROSTAT_ETA=${TABBY_MIROSTAT_ETA:-0.1}
      - TABBY_PRESENCE_PENALTY=${TABBY_PRESENCE_PENALTY:-0.02}

    entrypoint: ["sh", "-lc"]
    command:
      - python /workspace/scripts/tabbyapi_config.py --write /app/config.yml --write-sampler-preset /app/sampler_overrides/qsa_coding.yml && exec python3 main.py --host "$$TABBY_HOST"

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${TABBY_PORT:-5000}/v1/models', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 900s

  runner:
    build: ./runner
    image: ai-box-runner:latest
    profiles:
      - tools

    network_mode: host

    volumes:
      - ${AI_BOX_HOST_DIR:-.}:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ${MODELS_DIR:-/data/ai/models}:/models:ro
      - ${DEEPSWE_DIR:-/data/ai/deep-swe}:/deep-swe:ro
      - ${DEEPSWE_DIR:-/data/ai/deep-swe}:${DEEPSWE_DIR:-/data/ai/deep-swe}:ro
      - ${EVAL_RESULTS_DIR:-./eval-results}:/eval-results
      - ${EVAL_RESULTS_DIR:-./eval-results}:${EVAL_RESULTS_DIR:-/eval-results}
      - ${UV_PYTHON_CACHE_DIR:-${HOME}/.local/share/uv/python}:/root/.local/share/uv/python:ro
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.595.71.05:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
    devices:
      - /dev/nvidiactl
      - /dev/nvidia-uvm
      - /dev/nvidia0

    working_dir: /workspace

    environment:
      - AI_BOX=/workspace
      - AI_BOX_RUNNER=1
      - COMPOSE_PROJECT_NAME=ai-box
      # Do not set MODELS_DIR here — it breaks nested `docker compose` volume paths on the host.
      - EVAL_RESULTS_DIR=${EVAL_RESULTS_DIR:-/eval-results}
      - DEEPSWE_DIR=${DEEPSWE_DIR:-/data/ai/deep-swe}
      - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu

    # Usage: docker compose run --rm runner scripts/light_tune.sh

  mcp-canary:
    build:
      context: .
      dockerfile: scripts/mcp-canary.Dockerfile
    image: ai-box-mcp-canary:latest
    profiles:
      - mcp
    network_mode: host
    volumes:
      - .:/workspace
      - ${EVAL_RESULTS_DIR:-./eval-results}:/eval-results
    working_dir: /workspace
    environment:
      - MCP_CANARY_HOST=0.0.0.0
      - MCP_CANARY_PORT=${MCP_CANARY_PORT:-3005}
      - MCP_CANARY_NONCE=${MCP_CANARY_NONCE:-mcp-canary}
      - MCP_CANARY_LOG=${MCP_CANARY_LOG:-/eval-results/mcp-canary.jsonl}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3005/health"]
      interval: 5s
      timeout: 2s
      retries: 20

  surrealdb:
    image: surrealdb/surrealdb:v2.4.2
    profiles:
      - codegraph
    command:
      - start
      - --user
      - ${SURREAL_USER:-root}
      - --pass
      - ${SURREAL_PASS:-root}
      - rocksdb:/data/codegraph.db
    ports:
      - "3004:8000"
    volumes:
      - surrealdb-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  codegraph:
    build:
      context: ${CODEGRAPH_RUST_DIR:-../codegraph-rust}
    image: ai-box-codegraph:ce5bf27
    profiles:
      - codegraph
    network_mode: host
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      - SURREALDB_URL=${SURREALDB_URL:-ws://127.0.0.1:3004/rpc}
      - SURREALDB_USER=${SURREAL_USER:-root}
      - SURREALDB_PASS=${SURREAL_PASS:-root}
      - CODEGRAPH_LLM_PROVIDER=${CODEGRAPH_LLM_PROVIDER:-}
      - CODEGRAPH_EMBEDDING_PROVIDER=${CODEGRAPH_EMBEDDING_PROVIDER:-}
      - CODEGRAPH_MCP_HOST=0.0.0.0
      - CODEGRAPH_MCP_PORT=${CODEGRAPH_MCP_PORT:-3006}
    command: >
      sh -lc '
        codegraph schema apply &&
        codegraph dbcheck &&
        codegraph mcp --host "$$CODEGRAPH_MCP_HOST" --port "$$CODEGRAPH_MCP_PORT"
      '
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  sverklo:
    build:
      context: .
      dockerfile: scripts/sverklo-mcp.Dockerfile
      args:
        SVERKLO_VERSION: ${SVERKLO_VERSION:-latest}
    image: ai-box-sverklo:${SVERKLO_VERSION:-latest}
    profiles:
      - sverklo
    network_mode: host
    volumes:
      - ${AI_BOX_HOST_DIR:-.}:/workspace:ro
      - ${DEEPSWE_DIR:-/data/ai/deep-swe}:/deep-swe:ro
      - ${EVAL_RESULTS_DIR:-./eval-results}:/eval-results
      - sverklo-data:/root/.sverklo
    working_dir: /workspace
    environment:
      - SVERKLO_HTTP_HOST=0.0.0.0
      - SVERKLO_HTTP_PORT=${SVERKLO_MCP_PORT:-3007}
      - SVERKLO_PROJECT_PATH=${SVERKLO_PROJECT_PATH:-/deep-swe/tasks}
      - SVERKLO_PROXY_TIMEOUT_SEC=${SVERKLO_PROXY_TIMEOUT_SEC:-180}
      - SVERKLO_DEBUG=${SVERKLO_DEBUG:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3007/health"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  surrealdb-data:
  sverklo-data:
