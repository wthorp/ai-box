services:
  turboquant:
    build: ./turboquant
    image: ai-box-turboquant:latest

    # ── Performance: network / IPC ──────────────────────────────────────────
    # host networking eliminates NAT overhead; required because network_mode:host
    # is incompatible with ports: mappings — the server port is set in command.
    network_mode: host
    # Share host IPC namespace for CUDA inter-process memory (peer access).
    ipc: host

    # ── Performance: capabilities / syscall filter ──────────────────────────
    cap_add:
      - SYS_NICE          # lets CUDA set thread scheduling priorities
    security_opt:
      - seccomp:unconfined  # removes syscall filter; measured neutral→positive

    # ── Performance: resource limits ───────────────────────────────────────
    ulimits:
      memlock:
        soft: -1
        hard: -1            # required for --mlock to pin model weights in RAM
      stack: 67108864       # 64 MB stack — headroom for deep CUDA call stacks

    # ── GPU ─────────────────────────────────────────────────────────────────
    # deploy.resources requests the GPU explicitly — required when the default
    # Docker runtime is runc (not nvidia). NVIDIA_VISIBLE_DEVICES is still set
    # for the NVIDIA runtime to honour capability selection.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - MALLOC_ARENA_MAX=2
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    # ── Model volume ────────────────────────────────────────────────────────
    volumes:
      - ${MODELS_DIR:-/data/ai/models}:/models:ro

    # ── Server command ──────────────────────────────────────────────────────
    # Flags reference (turboquant extensions marked *):
    #   -ngl 999              offload all layers to GPU
    #   --no-mmap             load model directly into RAM (not memory-mapped)
    #   --mlock               lock model weights in RAM, prevent paging
    #   --n-cpu-moe N     *   keep first N MoE expert layers on CPU
    #   --cache-type-k/v  *   turboquant quantised KV cache (turbo2/3/4)
    #   -c                    context window size
    command: >
      -m /models/${MODEL_FILE:-model.gguf}
      -ngl 999
      --no-mmap
      --mlock
      --n-cpu-moe ${CPU_MOE_LAYERS:-35}
      --cache-type-k turbo4
      --cache-type-v turbo3
      -c ${CONTEXT_SIZE:-8192}
      --host 0.0.0.0
      --port 8080
      --jinja

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  rotorquant:
    build: ./rotorquant
    image: ai-box-rotorquant:latest

    network_mode: host
    ipc: host

    cap_add:
      - SYS_NICE
    security_opt:
      - seccomp:unconfined

    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack: 67108864

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - MALLOC_ARENA_MAX=2
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    volumes:
      - ${MODELS_DIR:-/data/ai/models}:/models:ro

    # Flags: same as turboquant but planar4/planar3 KV cache instead of turbo4/turbo3.
    # planar4 = 2D Givens rotation (K cache), planar3 = V cache
    # 28% faster decode and better perplexity than turbo equivalents.
    command: >
      -m /models/${MODEL_FILE:-model.gguf}
      -ngl 999
      --no-mmap
      --mlock
      --n-cpu-moe ${CPU_MOE_LAYERS:-35}
      --cache-type-k planar4
      --cache-type-v planar3
      -c ${CONTEXT_SIZE:-8192}
      --host 0.0.0.0
      --port 8082
      --jinja

    profiles:
      - rotorquant

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  bench:
    build: ./bench
    image: ai-box-bench:latest

    network_mode: host

    depends_on:
      turboquant:
        condition: service_healthy

    volumes:
      - ${EVAL_RESULTS_DIR:-./eval-results}:/bench/aider/tmp

    environment:
      - OPENAI_API_BASE=http://localhost:8080/v1
      - OPENAI_API_KEY=notneeded

    # One-shot runner — no restart, no healthcheck.
    # Usage: docker compose run --rm bench <run-name> [flags]
    # Example:
    #   docker compose run --rm bench q4-baseline \
    #     --model openai/local --languages python,go,rust,javascript \
    #     --edit-format whole --threads 1
